[project]
name = "theora-brain"
version = "0.1.0"
description = "THEORA OS — Local-first agentic intelligence core"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.9.0",
    "websockets>=13.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
llm = [
    "openai>=1.50.0",
    "langchain>=0.3.0",
    "langgraph>=0.2.0",
]
memory = [
    "qdrant-client>=1.11.0",
    "redis>=5.0.0",
]
local = [
    "llama-cpp-python>=0.3.0",
]

[tool.setuptools.packages.find]
where = ["."]
