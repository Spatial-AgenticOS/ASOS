<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">THEORA Logo</title>
  <desc id="desc">Stylized circular mark with THEORA wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#1f3a8a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <circle cx="256" cy="190" r="98" fill="none" stroke="url(#accent)" stroke-width="24" />
  <path d="M188 190h136" stroke="#e2e8f0" stroke-width="18" stroke-linecap="round" />
  <path d="M256 122v136" stroke="#e2e8f0" stroke-width="18" stroke-linecap="round" />
  <rect x="104" y="304" width="304" height="92" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.35" />
  <text
    x="256"
    y="364"
    text-anchor="middle"
    fill="#f8fafc"
    font-family="Inter, SF Pro Display, Segoe UI, Roboto, Arial, sans-serif"
    font-size="54"
    font-weight="700"
    letter-spacing="6"
  >
    THEORA
  </text>
</svg>
