<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERAL AI</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-tertiary: #1a1a24;
      --border: #2a2a3a;
      --text-primary: #e4e4ef;
      --text-secondary: #8888a0;
      --accent-cyan: #06b6d4;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-red);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--accent-green); }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      text-align: center;
      padding: 4px 8px;
    }

    .typing-indicator {
      align-self: flex-start;
      display: none;
      gap: 4px;
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator.active { display: flex; }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px 20px;
    }

    .empty-state .logo-large {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      margin-bottom: 4px;
    }

    .empty-state h3 {
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 600;
    }

    .empty-state p {
      font-size: 13px;
      max-width: 240px;
      line-height: 1.5;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 8px;
    }

    .quick-action {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .quick-action:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 4px 4px 16px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-color: var(--accent-cyan);
    }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      min-height: 20px;
      line-height: 1.4;
      padding: 8px 0;
    }
    #chat-input::placeholder { color: var(--text-secondary); }

    .send-btn, .voice-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .send-btn {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: #fff;
      opacity: 0.4;
    }
    .send-btn.active {
      opacity: 1;
    }
    .send-btn.active:hover {
      transform: scale(1.05);
    }

    .voice-btn {
      background: transparent;
      color: var(--text-secondary);
    }
    .voice-btn:hover { color: var(--accent-cyan); }
    .voice-btn.recording {
      color: var(--accent-red);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .context-bar {
      display: none;
      padding: 6px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-secondary);
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .context-bar.active { display: flex; }
    .context-bar .page-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .context-bar .ctx-toggle {
      color: var(--accent-cyan);
      cursor: pointer;
      font-size: 11px;
      border: none;
      background: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="icons/icon48.png" class="logo" alt="FERAL" />
      <span class="header-title">FERAL</span>
      <div class="status-dot" id="status-dot" title="Disconnected"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-context" title="Include page context">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
      <button class="icon-btn" id="btn-clear" title="Clear chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  </div>

  <div class="context-bar" id="context-bar">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    <span class="page-title" id="ctx-page-title">Page context attached</span>
    <button class="ctx-toggle" id="ctx-detach">Detach</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <img src="icons/icon128.png" class="logo-large" alt="FERAL" />
      <h3>Hey, I'm FERAL</h3>
      <p>Ask me anything. I can see your current page, remember things, and stay proactive.</p>
      <div class="quick-actions">
        <button class="quick-action" data-prompt="Summarize this page">Summarize page</button>
        <button class="quick-action" data-prompt="What's on my schedule today?">My schedule</button>
        <button class="quick-action" data-prompt="What should I focus on right now?">Focus advice</button>
      </div>
    </div>
  </div>

  <div class="typing-indicator" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="chat-input" rows="1" placeholder="Ask FERAL anything..."></textarea>
      <button class="voice-btn" id="voice-btn" title="Voice input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="send-btn" id="send-btn" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
