<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text2: #8888a0;
      --cyan: #06b6d4;
      --purple: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }
    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header-text p {
      font-size: 11px;
      color: var(--text2);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); }
    .status-label {
      font-size: 13px;
      flex: 1;
    }
    .reconnect-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .reconnect-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      margin-bottom: 16px;
    }
    input[type="text"]:focus {
      border-color: var(--cyan);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #fff;
    }
    .btn-secondary {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text2);
    }
    .footer a {
      color: var(--cyan);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" class="logo" alt="FERAL" />
    <div class="header-text">
      <h1>FERAL AI</h1>
      <p>v2026.5.27</p>
    </div>
  </div>

  <div class="status-row">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Disconnected</span>
    <button class="reconnect-btn" id="reconnect-btn">Reconnect</button>
  </div>

  <label for="brain-url">Brain WebSocket URL</label>
  <input type="text" id="brain-url" placeholder="ws://localhost:9090/v1/session">

  <button class="btn btn-primary" id="open-sidebar">Open Sidebar</button>
  <button class="btn btn-secondary" id="open-options">Settings</button>

  <div class="footer">
    <a href="#" id="options-link">Advanced Options</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
