version: "3.9"

services:
  feral-brain:
    build:
      context: ./feral-core
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FERAL_LLM_PROVIDER=${FERAL_LLM_PROVIDER:-openai}
      - FERAL_LLM_MODEL=${FERAL_LLM_MODEL:-gpt-4o-mini}
      - FERAL_LLM_BASE_URL=${FERAL_LLM_BASE_URL:-}
      - FERAL_VISION_ENABLED=${FERAL_VISION_ENABLED:-false}
      - FERAL_VISION_MAX_FRAME_KB=${FERAL_VISION_MAX_FRAME_KB:-512}
      - FERAL_PROACTIVE=${FERAL_PROACTIVE:-false}
      - FERAL_STREAMING=${FERAL_STREAMING:-true}
      - FERAL_SCENE_COOLDOWN=${FERAL_SCENE_COOLDOWN:-10}
      - FERAL_STT_PROVIDER=${FERAL_STT_PROVIDER:-openai}
      - FERAL_TTS_PROVIDER=${FERAL_TTS_PROVIDER:-openai}
      - FERAL_TTS_VOICE=${FERAL_TTS_VOICE:-nova}
      - FERAL_WAKE_WORD=${FERAL_WAKE_WORD:-true}
      - NODE_API_KEY=${NODE_API_KEY:-dev-secret-key}
    volumes:
      - feral-memory:/root/.feral
      - feral-config:/root/.config/feral
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  feral-client:
    build:
      context: ./feral-client
      dockerfile: Dockerfile
      args:
        - VITE_BRAIN_HOST=${VITE_BRAIN_HOST:-localhost}
        - VITE_BRAIN_PORT=9090
    ports:
      - "3000:80"
    depends_on:
      feral-brain:
        condition: service_healthy
    restart: unless-stopped

  skill-registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REGISTRY_DB=/data/registry.db
    volumes:
      - registry-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  feral-memory:
    driver: local
  feral-config:
    driver: local
  registry-data:
    driver: local
