version: "3.9"

services:
  asos-brain:
    build:
      context: ./asos-core
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - THEORA_LLM_PROVIDER=${THEORA_LLM_PROVIDER:-openai}
      - THEORA_LLM_MODEL=${THEORA_LLM_MODEL:-gpt-4o-mini}
      - THEORA_LLM_BASE_URL=${THEORA_LLM_BASE_URL:-}
      - THEORA_VISION_ENABLED=${THEORA_VISION_ENABLED:-false}
      - THEORA_VISION_MAX_FRAME_KB=${THEORA_VISION_MAX_FRAME_KB:-512}
      - THEORA_PROACTIVE=${THEORA_PROACTIVE:-false}
      - THEORA_STREAMING=${THEORA_STREAMING:-true}
      - THEORA_SCENE_COOLDOWN=${THEORA_SCENE_COOLDOWN:-10}
      - THEORA_STT_PROVIDER=${THEORA_STT_PROVIDER:-openai}
      - THEORA_TTS_PROVIDER=${THEORA_TTS_PROVIDER:-openai}
      - THEORA_TTS_VOICE=${THEORA_TTS_VOICE:-nova}
      - THEORA_WAKE_WORD=${THEORA_WAKE_WORD:-true}
      - NODE_API_KEY=${NODE_API_KEY:-dev-secret-key}
    volumes:
      - theora-memory:/root/.theora
      - theora-config:/root/.config/theora
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  asos-client:
    build:
      context: ./asos-client
      dockerfile: Dockerfile
      args:
        - VITE_BRAIN_HOST=${VITE_BRAIN_HOST:-localhost}
        - VITE_BRAIN_PORT=9090
    ports:
      - "3000:80"
    depends_on:
      asos-brain:
        condition: service_healthy
    restart: unless-stopped

  skill-registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REGISTRY_DB=/data/registry.db
    volumes:
      - registry-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  theora-memory:
    driver: local
  theora-config:
    driver: local
  registry-data:
    driver: local
