name: Desktop Build
# The desktop app (Tauri + Rust + WebView2/WebKit/GTK) is an experimental
# distribution path. It is NOT part of the install-from-PyPI story and is
# not uploaded as a release asset yet (needs Apple Developer ID + Windows
# Authenticode + Tauri updater keypair first — TAURI_SIGNING_PRIVATE_KEY,
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD, APPLE_CERT_P12, APPLE_CERT_PW,
# WINDOWS_CERT_P12, WINDOWS_CERT_PW).
#
# Previously this workflow also ran on every PR touching desktop/**. That
# burned ~30 runner-min per desktop-adjacent PR for a build whose artifacts
# we never ship, so the pull_request trigger was removed in 2026.4.18-dev.
# Re-add the `pull_request: paths: ['desktop/**']` trigger the day Apple
# Developer ID + Windows Authenticode certs land in repo secrets.
on:
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - working-directory: desktop
        run: npm ci
      - working-directory: desktop
        run: npm run tauri build -- --debug
