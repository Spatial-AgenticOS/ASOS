name: Desktop Build
# The desktop app (Tauri + Rust + WebView2/WebKit/GTK) is an experimental
# distribution path. It is NOT part of the install-from-PyPI story and is
# not uploaded as a release asset yet (needs Tauri signing keys in repo
# secrets first — TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
# for the updater). Until that's set up, we only build on demand and on PRs
# that specifically touch the desktop/ directory, so broken desktop code
# cannot block a PyPI release or an HA add-on push.
on:
  workflow_dispatch:
  pull_request:
    paths: ['desktop/**']
jobs:
  build:
    strategy:
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - working-directory: desktop
        run: npm ci
      - working-directory: desktop
        run: npm run tauri build -- --debug
