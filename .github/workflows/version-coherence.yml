name: Version coherence

#
# This workflow has two responsibilities, split into two jobs:
#
#   1. ``version-drift`` — release-block gate. Every declared FERAL
#      version literal in the repo must match
#      ``feral-core/pyproject.toml``'s ``[project] version``. Runs on
#      PRs AND on push-to-main; fails fast on any drift. The version
#      literal IS author-controlled, so failing the PR is the right
#      thing to do.
#
#   2. ``readme-test-counts-autobump`` — derived-artifact maintainer.
#      The ``<!-- sync-versions:test-counts pytest=N vitest=M -->``
#      marker in README.md is a *derived* count — no human should ever
#      have to know what the live numbers are. This job runs ONLY on
#      push-to-main: it computes the live counts, and if the README
#      marker is out of sync it pushes a single-line bump commit
#      (with ``[skip ci]`` so it doesn't loop). Never fails the
#      workflow — derived state is reconciled, not policed.
#
# What this is NOT:
#   - It is NOT a PR-time test-count gate. We tried that. Every PR
#     author had to predict what the post-merge live count would be,
#     which is impossible when other PRs are in flight. The previous
#     "skip dependabot" conditional was a workaround for that flaw.
#     The right fix is to make the marker self-heal on main, which is
#     what ``readme-test-counts-autobump`` does.
#
#   - It does NOT replace the actual pytest / vitest CI jobs in
#     ``ci.yml`` — those are still the source of truth for whether
#     tests pass. This workflow only cares about the *count*.

on:
  push:
    branches: [main]
  # Audit-r8 brief #02 fix: drop base-branch filter so stacked PRs
  # (PR into a feature branch, not main) still gate on version
  # drift. Previously version drift could land in a phase branch
  # and surprise the merge-to-main PR.
  pull_request:
  workflow_dispatch:

concurrency:
  group: version-coherence-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # Job 1: version-drift — the actual release-block gate.
  # ---------------------------------------------------------------------
  version-drift:
    name: sync_versions --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # ``--check --no-metadata`` is read-only and reads the source
      # straight from feral-core/pyproject.toml; no install needed.
      - name: Run version drift check
        run: python3 scripts/sync_versions.py --check --no-metadata

  # ---------------------------------------------------------------------
  # Job 2: readme-test-counts-autobump — keeps the README marker honest
  # WITHOUT making PR authors do the bookkeeping. Push-to-main only.
  # ---------------------------------------------------------------------
  readme-test-counts-autobump:
    name: README test-count auto-bump (push-to-main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the full history + a token that can push back to
          # main so the auto-bump commit lands on the protected branch.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether test-count reconciliation is needed
        id: recount_gate
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "recount=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "recount=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base" "$head" || true)
          if echo "$changed" | grep -Eq \
            '^(feral-core/tests/|feral-client-v2/src/__tests__/|feral-client-v2/vitest\.config|feral-core/pyproject\.toml|feral-core/pytest\.ini|feral-client-v2/package(\-lock)?\.json|README\.md)'; then
            echo "recount=true" >> "$GITHUB_OUTPUT"
          else
            echo "recount=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping README test-count auto-bump (no test-count-affecting files changed)."
          fi

      - name: Set up Python
        if: steps.recount_gate.outputs.recount == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        if: steps.recount_gate.outputs.recount == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: feral-client-v2/package-lock.json

      - name: Install feral-core (for pytest collection)
        if: steps.recount_gate.outputs.recount == 'true'
        working-directory: feral-core
        run: pip install -e ".[all,dev]"

      - name: Install feral-client-v2 deps (for vitest list)
        if: steps.recount_gate.outputs.recount == 'true'
        working-directory: feral-client-v2
        run: npm ci

      - name: Compute live pytest count
        id: pytest_count
        if: steps.recount_gate.outputs.recount == 'true'
        working-directory: feral-core
        # ``pytest --collect-only -q`` ends with a line like
        # "1964 tests collected in 4.56s". We grep for that and emit
        # the integer to GITHUB_OUTPUT.
        run: |
          set -euo pipefail
          line=$(python3 -m pytest --collect-only -q --no-cov 2>&1 | tail -3 | grep -E "^[0-9]+ tests? collected" || true)
          if [ -z "$line" ]; then
            echo "::error::could not parse pytest --collect-only output"
            python3 -m pytest --collect-only -q --no-cov 2>&1 | tail -30
            exit 1
          fi
          n=$(echo "$line" | grep -oE "^[0-9]+")
          echo "live_pytest=$n" >> "$GITHUB_OUTPUT"
          echo "pytest live count: $n"

      - name: Compute live vitest count
        id: vitest_count
        if: steps.recount_gate.outputs.recount == 'true'
        working-directory: feral-client-v2
        # ``vitest list`` prints one test per line ("file > suite > name").
        run: |
          set -euo pipefail
          n=$(npx vitest list 2>/dev/null | grep -cE " > " || true)
          if [ "$n" = "0" ] || [ -z "$n" ]; then
            echo "::error::vitest list returned zero tests — refusing to proceed"
            npx vitest list 2>&1 | head -30
            exit 1
          fi
          echo "live_vitest=$n" >> "$GITHUB_OUTPUT"
          echo "vitest live count: $n"

      - name: Auto-bump README marker if drifted
        if: steps.recount_gate.outputs.recount == 'true'
        env:
          LIVE_PYTEST: ${{ steps.pytest_count.outputs.live_pytest }}
          LIVE_VITEST: ${{ steps.vitest_count.outputs.live_vitest }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          live_pytest = int(os.environ["LIVE_PYTEST"])
          live_vitest = int(os.environ["LIVE_VITEST"])

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")

          marker_re = re.compile(
              r"<!--\s*sync-versions:test-counts\s+"
              r"pytest=(?P<py>\d+)\s+vitest=(?P<vi>\d+)\s*-->"
          )
          marker = marker_re.search(readme)
          if marker is None:
              print(
                  "::warning::README.md is missing the "
                  "<!-- sync-versions:test-counts pytest=N vitest=M --> "
                  "marker; nothing to auto-bump."
              )
              sys.exit(0)

          declared_pytest = int(marker.group("py"))
          declared_vitest = int(marker.group("vi"))

          if declared_pytest == live_pytest and declared_vitest == live_vitest:
              print(
                  f"OK — README marker already matches live "
                  f"(pytest={live_pytest}, vitest={live_vitest}); "
                  "nothing to do."
              )
              sys.exit(0)

          # Bump both the machine-readable marker and the human sentence
          # below it. Keep the change strictly scoped to those two
          # patterns so we never touch unrelated README content.
          new_marker = (
              f"<!-- sync-versions:test-counts pytest={live_pytest} "
              f"vitest={live_vitest} -->"
          )
          updated = marker_re.sub(new_marker, readme, count=1)

          # Human sentence (best-effort; if it doesn't exist or already
          # matches, we just keep the marker change and move on).
          updated = re.sub(
              r"\*\*\d+ backend \+ \d+ frontend tests pass\*\*",
              f"**{live_pytest} backend + {live_vitest} frontend "
              "tests pass**",
              updated,
              count=1,
          )

          if updated == readme:
              # Marker regex didn't actually mutate (possible if the live
              # counts equal declared after all — defensive belt-and-braces).
              print("no effective change after substitution; nothing to do.")
              sys.exit(0)

          readme_path.write_text(updated, encoding="utf-8")
          print(
              f"README marker bumped: pytest={declared_pytest}->{live_pytest}, "
              f"vitest={declared_vitest}->{live_vitest}"
          )

          # Commit + push back to main with [skip ci] so we don't loop.
          subprocess.run(
              ["git", "config", "user.name", "github-actions[bot]"],
              check=True,
          )
          subprocess.run(
              [
                  "git", "config", "user.email",
                  "41898282+github-actions[bot]@users.noreply.github.com",
              ],
              check=True,
          )
          subprocess.run(["git", "add", "README.md"], check=True)
          msg = (
              f"chore(readme): auto-bump test-count marker to live "
              f"(pytest={live_pytest}, vitest={live_vitest}) [skip ci]\n\n"
              f"Drift was {live_pytest - declared_pytest:+d} pytest, "
              f"{live_vitest - declared_vitest:+d} vitest. README marker "
              "is a derived artifact maintained by the version-coherence "
              "workflow; PR authors don't bump it."
          )
          subprocess.run(["git", "commit", "-m", msg], check=True)
          subprocess.run(
              ["git", "push", "origin", "HEAD:main"],
              check=True,
          )
          print("pushed README bump to main.")
          PY
