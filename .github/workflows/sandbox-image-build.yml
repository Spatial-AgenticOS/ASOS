name: Sandbox Image Build (W22)

# CI smoke build for the W22 sandbox images. The two sandbox surfaces
# (Dockerfile.sandbox + Dockerfile.sandbox-browser) MUST build cleanly
# at all times; if they don't, a future operator can't ship the
# sandbox and feral-core/security/docker_sandbox.py has no image to
# launch. continue-on-error is intentionally false.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.sandbox"
      - "Dockerfile.sandbox-common"
      - "Dockerfile.sandbox-browser"
      - "feral-core/security/sandbox_image.py"
      - ".github/workflows/sandbox-image-build.yml"
  pull_request:
    paths:
      - "Dockerfile.sandbox"
      - "Dockerfile.sandbox-common"
      - "Dockerfile.sandbox-browser"
      - "feral-core/security/sandbox_image.py"
      - ".github/workflows/sandbox-image-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Smoke-build sandbox images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build feral-sandbox-common (base)
        run: |
          docker buildx build \
            --file Dockerfile.sandbox-common \
            --tag feral-sandbox-common:latest \
            --load \
            .

      - name: Build feral-sandbox (Dockerfile.sandbox)
        run: |
          docker buildx build \
            --file Dockerfile.sandbox \
            --tag feral-sandbox:test \
            --build-arg SANDBOX_COMMON_TAG=latest \
            --load \
            .

      - name: Build feral-sandbox-browser (Dockerfile.sandbox-browser)
        run: |
          docker buildx build \
            --file Dockerfile.sandbox-browser \
            --tag feral-sandbox-browser:test \
            --build-arg SANDBOX_COMMON_TAG=latest \
            --load \
            .

      - name: Inspect built images
        run: docker images "feral-sandbox*"

      - name: Smoke-run minimal sandbox watchdog (no script → exit 64)
        run: |
          set +e
          docker run --rm --network=none --cap-drop=ALL \
            --read-only --tmpfs /tmp:rw,nosuid,size=64m \
            feral-sandbox:test
          rc=$?
          # Watchdog exits 124 (timeout) or non-zero when no entry script
          # is mounted. Accept any non-zero — the goal here is "container
          # boots, ENTRYPOINT runs, no segfault".
          if [ "$rc" = "0" ]; then
            echo "feral-sandbox watchdog returned 0 with no entry script — unexpected"
            exit 1
          fi

      - name: Smoke-run browser sandbox (chromium --version)
        run: |
          docker run --rm --network=none --cap-drop=ALL \
            feral-sandbox-browser:test --version
