name: HA Add-on Build

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  push:
    paths:
      - "feral-ha-addon/**"
      - ".github/workflows/ha-addon.yml"
  pull_request:
    paths:
      - "feral-ha-addon/**"
      - ".github/workflows/ha-addon.yml"
  workflow_dispatch:
    inputs:
      feral_version:
        description: "feral-ai PyPI version (calver, no v prefix)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ha-add-on-build-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve FERAL_VERSION
        id: version
        env:
          INPUT_FERAL_VERSION: ${{ github.event.inputs.feral_version }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib

          manual = (os.environ.get("INPUT_FERAL_VERSION") or "").strip()
          if manual:
              version = manual
          else:
              pyproject = pathlib.Path("feral-core/pyproject.toml")
              data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
              version = str((data.get("project") or {}).get("version") or "").strip()

          if not version:
              raise SystemExit("Failed to resolve FERAL_VERSION")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"FERAL_VERSION={version}\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"feral_version={version}\n")
          print(f"Resolved FERAL_VERSION={version}")
          PY

      - name: Check version availability on PyPI
        id: pypi
        run: |
          python3 - <<'PY'
          import json
          import os
          from urllib.request import urlopen

          version = os.environ["FERAL_VERSION"]
          available = False
          try:
              with urlopen("https://pypi.org/pypi/feral-ai/json", timeout=10) as resp:
                  data = json.load(resp)
              available = version in (data.get("releases") or {})
          except Exception:
              available = False

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"available={'true' if available else 'false'}\n")
          print(f"feral-ai=={version} available_on_pypi={available}")
          PY

      - name: Skip note for unpublished version
        if: steps.pypi.outputs.available != 'true'
        run: |
          echo "::notice::Skipping HA add-on image build because feral-ai==${FERAL_VERSION} is not on PyPI yet."

      - name: Build addon image
        if: steps.pypi.outputs.available == 'true'
        run: |
          cd feral-ha-addon
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.19 \
            --build-arg "FERAL_VERSION=${FERAL_VERSION}" \
            -t feral-addon:test .

      - name: Smoke test (import installed package)
        if: steps.pypi.outputs.available == 'true'
        run: |
          docker run --rm feral-addon:test python3 -c \
            "import importlib.metadata as m; import version; print(m.version('feral-ai'), version.VERSION, 'ok')"
