name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Brain — ruff lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check --output-format=github --select=E,F,W --ignore=E501,E402,F401,W291,W293 .

  brain-tests:
    name: Brain — pytest
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Run tests with coverage (40% threshold)
        run: pytest tests/ -x -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=40

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./feral-core/coverage.xml
          fail_ci_if_error: false

  client-build:
    name: Client — vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: feral-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npx vitest run

  syntax-check:
    name: Brain — syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax (all .py files)
        run: |
          find . -name '*.py' -not -path './.git/*' -not -path './venv/*' \
            | xargs python -m py_compile
