name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: for pull-request events, cancel the prior run on the
# same PR when a new push arrives. For pushes to main we don't cancel
# (we want every merge-commit's CI result on record). Net effect:
# a PR with 5 rapid pushes runs CI 1× instead of 5×.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Brain — ruff lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check --output-format=github --select=E,F,W --ignore=E501,E402,F401,W291,W293 .

  brain-tests:
    name: Brain — pytest full matrix (${{ matrix.python-version }}, ${{ matrix.os }})
    needs: lint
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Audit Python dependencies
        run: pip install pip-audit && pip-audit --strict 2>&1 || echo "::warning::pip-audit found vulnerabilities"
        continue-on-error: true

      - name: Run tests with coverage (50% threshold)
        # Raised from 46 → 50 alongside the pyproject.toml change.
        # Addopts there enables --cov by default, but we still pass the
        # explicit flags here so the CI output is self-documenting and
        # the XML report is emitted for Codecov.
        run: pytest tests/ -x -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=50

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./feral-core/coverage.xml
          fail_ci_if_error: false

  brain-tests-pr:
    name: Brain — pytest PR fast lane (3.11, ubuntu)
    needs: lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Run tests with coverage (50% threshold)
        run: pytest tests/ -x -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=50

  client-build:
    name: Client — vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: feral-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit npm dependencies
        run: npm audit --audit-level=high 2>&1 || echo "::warning::npm audit found vulnerabilities"
        continue-on-error: true

      - name: Coverage gate note
        run: |
          echo "::notice::vitest coverage gate: 20/40/18/20 (stmts/branches/funcs/lines)."
          echo "::notice::New pages, hooks, or lib files must ship with a matching smoke test in src/__tests__/ so this gate stays honest."

      - name: Run tests with coverage
        run: npx vitest run --coverage

  client-v2:
    name: Client v2 — vite build + vitest coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-client-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: feral-client-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage (25/18/19/27)
        # Thresholds live in vitest.config.js — the ratchet is documented
        # in docs/coverage.md. Raising them is a single-file change.
        run: npm run test:coverage

  webui-v2-coherence:
    name: WebUI v2 — bundled asset coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: feral-client-v2/package-lock.json

      - name: Rebuild and sync v2 bundle
        env:
          FERAL_FORCE_NPM_CI: "1"
        run: scripts/build_webui_v2.sh

      - name: Verify v2 model-picker contract tokens
        run: python3 scripts/check_webui_v2_contract.py

      - name: Ensure committed bundles are fresh
        run: |
          if ! git diff --exit-code -- feral-client-v2/dist feral-core/webui_v2; then
            echo "::error::Stale bundled assets detected. Run scripts/build_webui_v2.sh and commit feral-client-v2/dist + feral-core/webui_v2."
            exit 1
          fi

  syntax-check:
    name: Brain — syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax (all .py files)
        run: |
          find . -name '*.py' -not -path './.git/*' -not -path './venv/*' \
            | xargs python -m py_compile

  boundary-check:
    name: Architecture boundaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feral-core
    steps:
      - uses: actions/checkout@v4
      - name: Check skill boundaries
        run: |
          echo "Checking that skill implementations don't import core modules..."
          VIOLATIONS=$(grep -rn "^from agents\.\|^from api\.\|^from memory\.\|^import agents\|^import api\|^import memory" skills/impl/ --include="*.py" | grep -v "# boundary-ok" | grep -v "__init__.py" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "BOUNDARY VIOLATIONS FOUND:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "PASS: No boundary violations"
