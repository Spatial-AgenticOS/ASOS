<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THEORA</title>
  <style>
    :root {
      --bg:       #07070d;
      --surface:  #111119;
      --border:   #1e1e2e;
      --text:     #e8e8f0;
      --muted:    #6b6b82;
      --accent:   #6366f1;
      --accent2:  #a78bfa;
      --glow:     rgba(99,102,241,.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; overflow: hidden; }
    #app { height: 100%; }

    /* ----- Splash / loading screen ----- */
    .splash {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .splash::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 45%, rgba(99,102,241,.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 60% 55%, rgba(167,139,250,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .splash-logo {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 1.5rem;
    }
    .splash-logo svg { width: 100%; height: 100%; }
    .splash-logo .glow-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      animation: pulse-ring 2.4s ease-out infinite;
    }
    .splash-logo .glow-ring:nth-child(2) { animation-delay: 0.8s; }
    .splash-logo .glow-ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes pulse-ring {
      0%   { transform: scale(.85); opacity: .6; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    .splash-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .splash-subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .splash-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 0.75rem;
    }
    .splash-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .3;
      animation: dot-blink 1.4s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: .2s; }
    .splash-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot-blink {
      0%, 80%, 100% { opacity: .3; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.3); }
    }

    .splash-status {
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.7;
    }

    /* ----- Error screen ----- */
    .error-wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .error-icon {
      width: 52px; height: 52px;
      margin-bottom: 1rem;
      color: #ef4444;
    }
    .error-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .error-hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      max-width: 400px;
      line-height: 1.5;
    }
    .error-hint code {
      background: var(--surface);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .btn {
      padding: 0.55rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: background .15s, transform .1s;
    }
    .btn:hover { background: #5457e5; }
    .btn:active { transform: scale(.97); }

    /* ----- Iframe (brain loaded) ----- */
    .frame { width: 100%; height: 100vh; border: none; display: block; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
