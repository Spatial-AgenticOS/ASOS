---
# FERAL Brain default Prometheus alert rules.
# Owned by W13 (roadmap §3.1 #4). Metric definitions live in
# feral-core/observability/metrics.py; the matching dashboard is
# ops/grafana/feral-overview.json. Tests in
# feral-core/tests/test_metrics_registry.py enforce parity.
groups:
  - name: feral.brain.default
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(feral_http_requests_total{status="5xx"}[5m]))
            /
            clamp_min(sum(rate(feral_http_requests_total[5m])), 1e-9)
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          workstream: W13
        annotations:
          summary: >-
            FERAL Brain 5xx error rate above 5%
          description: >-
            More than 5% of HTTP responses have been 5xx for the last
            10 minutes. Check api/server.py logs and recent deploys.
          runbook_url: docs/mintlify/operations/metrics.mdx#highErrorRate

      - alert: LLMAllProvidersDown
        expr: increase(feral_llm_failover_chain_exhausted_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
          workstream: W19
        annotations:
          summary: >-
            Every configured LLM provider failed for at least one request
          description: >-
            feral_llm_failover_chain_exhausted_total has incremented in
            the last 5 minutes — the configured failover chain ran out
            of providers. Check provider keys, quotas, and the LLM
            provider catalog.
          runbook_url: docs/mintlify/operations/metrics.mdx#LLMAllProvidersDown

      - alert: SyncPeerDown
        expr: feral_sync_active_peers == 0 and feral_sync_was_active_recent > 0
        for: 15m
        labels:
          severity: warning
          workstream: W11
        annotations:
          summary: >-
            Federated sync has zero active peers
          description: >-
            feral_sync_active_peers has been 0 for 15 minutes despite
            the sync engine reporting recent activity
            (feral_sync_was_active_recent > 0). Check mDNS / passphrase
            / peer logs.
          runbook_url: docs/mintlify/operations/metrics.mdx#SyncPeerDown

      - alert: SupervisorBacklog
        expr: feral_supervisor_approval_queue > 50
        for: 30m
        labels:
          severity: warning
          workstream: W17
        annotations:
          summary: >-
            Supervisor approval queue is backed up
          description: >-
            feral_supervisor_approval_queue has exceeded 50 pending
            items for 30 minutes. Either drain the queue or
            investigate why approvals are not being decided.
          runbook_url: docs/mintlify/operations/metrics.mdx#SupervisorBacklog

      - alert: VaultDecryptFailed
        expr: increase(feral_vault_decrypt_errors_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          workstream: W9
        annotations:
          summary: >-
            Vault decrypt error observed
          description: >-
            feral_vault_decrypt_errors_total incremented — an entry
            could not be AEAD-decrypted. Possible causes: wrong key
            in the keychain, tampered ciphertext, or schema drift.
            Inspect feral-core/security/vault.py logs.
          runbook_url: docs/mintlify/operations/metrics.mdx#VaultDecryptFailed
